<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tiddly Bookmarks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup" class="popup">
    <!-- Not configured state -->
    <div id="setup-view" hidden>
      <h2 class="setup-heading">Welcome to Tiddly Bookmarks</h2>
      <p class="setup-message">Connect your account to start saving and searching bookmarks.</p>
      <button id="open-options" class="btn-primary">Open Settings</button>
    </div>

    <!-- Tabbed header: tablist + adjacent settings button -->
    <div id="popup-header" class="popup-header" hidden>
      <div role="tablist" aria-label="Tiddly Bookmarks" class="tablist">
        <button type="button" role="tab" id="tab-save" aria-controls="save-view" aria-selected="true" tabindex="0" class="tab">Save</button>
        <button type="button" role="tab" id="tab-search" aria-controls="search-view" aria-selected="false" tabindex="-1" class="tab">Search</button>
      </div>
      <button type="button" id="settings-btn" class="settings-btn" aria-label="Open settings" title="Settings">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"/>
          <circle cx="12" cy="12" r="3" stroke-width="2"/>
        </svg>
      </button>
    </div>

    <!-- Save form (Milestone 2) -->
    <div id="save-view" role="tabpanel" aria-labelledby="tab-save" hidden>
      <div class="view-header">
        <input type="text" id="url" readonly>
      </div>
      <div id="loading-indicator" class="loading" role="status" aria-label="Loading page information">
        <div class="spinner"></div>
        <span class="loading-label">Loading page information...</span>
      </div>
      <form id="save-form" hidden>
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title">
          <span class="field-limit" id="title-limit"></span>
        </div>
        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" rows="2"></textarea>
          <span class="field-limit" id="description-limit"></span>
        </div>
        <div class="field">
          <div class="label-row">
            <label for="tags-input">Tags</label>
            <button type="button" id="clear-tags" class="clear-link" hidden>Clear</button>
          </div>
          <input type="text" id="tags-input" placeholder="Add tags...">
          <div id="tag-chips" class="tag-chips"></div>
          <div id="tag-suggestions" class="tag-suggestions" hidden></div>
        </div>
        <button type="submit" id="save-btn" class="btn-primary btn-full">Save Bookmark</button>
      </form>
      <div id="save-status" class="status" hidden></div>
    </div>

    <!-- Search view (Milestone 3) -->
    <div id="search-view" role="tabpanel" aria-labelledby="tab-search" hidden>
      <div class="search-header">
        <div class="view-header">
          <input type="text" id="search-input" placeholder="Search Tiddly Bookmarks...">
        </div>
        <div class="search-filters">
          <div class="search-tag-picker">
            <input type="text" id="search-tag-input" placeholder="Filter by tag..." autocomplete="off" aria-label="Filter by tag">
            <div id="search-tag-dropdown" class="search-tag-dropdown" hidden></div>
          </div>
          <select id="search-sort-select" aria-label="Sort order">
            <option value="created_at">Date Added</option>
            <option value="relevance">Relevance</option>
            <option value="last_used_at">Last Used</option>
            <option value="updated_at">Date Modified</option>
            <option value="title">Title</option>
          </select>
        </div>
        <div id="search-active-tags" class="search-active-tags"></div>
      </div>
      <div id="search-loading" class="loading" role="status" aria-label="Loading bookmarks" hidden>
        <div class="spinner"></div>
        <span class="loading-label">Loading bookmarks...</span>
      </div>
      <div class="search-scroll">
        <div id="search-results" class="search-results"></div>
        <button id="load-more" class="btn-secondary btn-full" hidden>Load more</button>
      </div>
    </div>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
