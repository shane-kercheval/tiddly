line-length = 99
indent-width = 4
extend-exclude = ["backend/src/db/migrations"]

[lint]
select = [
    "E", "W", "F", "N", "D", "ANN", "A", "COM", "C4", "UP", "PT", "RET", "SIM", "ASYNC", "ARG",
    "PD", "PL", "NPY", "RUF",
]
ignore = [
    "ANN204", "ANN206", "ANN401",
    "D105", "D107", "D203", "D205", "D212", "D401", "D407", "D413",
    "PLR0913", "PLR2004"
]

[lint.per-file-ignores]
# `timeout` and `num_retries` on the LLM wrapper and suggestion service are
# pass-through parameters for LiteLLM's `acompletion(timeout=..., num_retries=...)`
# — we're not implementing a timeout context ourselves, so `asyncio.timeout`
# doesn't apply. Callers use these to tune latency vs resilience (short for
# UI, long for evals). Multi-line signatures put the param on its own line,
# so `# noqa` on the def line doesn't suppress the warning.
"backend/src/services/llm_service.py" = ["ASYNC109"]
"backend/src/services/suggestion_service.py" = ["ASYNC109"]

"*/tests/*" = [
    # ignore same warnings as above
    "ANN001", "ANN101", "ANN204", "ANN206",
    "D102", "D105", "D107", "D203", "D205", "D212", "D401", "D407", "D413",
    "PLR0913", "PLR2004",
    # ignore additional warnings
    "ANN202",  # missing-type-annotation
    "E501",  # line too long
    "ANN201",  # missing-return-type-undocumented-public-function
    "D103",  # undocumented-public-function
    "D404",  # first word of docstring should not be "This"
    "N802",  # invalid-function-name
    "PLR0915",  # too many statements
    "SIM117"  # nested with statements
]